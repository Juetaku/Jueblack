<!DOCTYPE html>
<html>
<head>
  <title>No tocar</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial;
      overflow: hidden;
    }

    button {
      padding: 20px;
      font-size: 25px;
      cursor: pointer;
      border: none;
      border-radius: 10px;
    }

    #video {
      display: none;
      position: fixed;
      width: 100%;
      height: 100%;
      object-fit: cover;
      top: 0;
      left: 0;
    }

    #mensaje {
      position: absolute;
      font-size: 40px;
      display: none;
    }
  </style>
</head>
<body>

<button onclick="trolleo()">NO TOCAR</button>

<h1 id="mensaje">💀 CAÍSTE 💀</h1>

<video id="video">
  <source src="19K views · 1.7K reactions ｜ Los memes de la Bocchi uwu on Reels [969609975458838].mp4" type="19K views · 1.7K reactions ｜ Los memes de la Bocchi uwu on Reels [969609975458838].mp4">
</video>

<script>
function trolleo() {
  document.querySelector("button").style.display = "none";

  let mensaje = document.getElementById("mensaje");
  mensaje.style.display = "block";

  setTimeout(() => {
    mensaje.style.display = "none";

    let v = document.getElementById("video");
    v.style.display = "block";
    v.play();

    // pantalla completa (más troll 😈)
    if (document.documentElement.requestFullscreen) {
      document.documentElement.requestFullscreen();
    }

  }, 1500);
}
</script>
